[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "https://audit-garantie-vw-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA React Router : /login, rechargement, liens directs
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
