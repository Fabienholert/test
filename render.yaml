services:
  - type: web
    name: audit-garantie-vw
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: "npm run build"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # À configurer dans le dashboard Render
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
